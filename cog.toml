from_latest_tag = false
ignore_merge_commits = false
ignore_fixup_commits = false
disable_changelog = false
disable_bump_commit = false
generate_mono_repository_global_tag = true
generate_mono_repository_package_tags = true
branch_whitelist = []
pre = "alpha.*"
skip_ci = "[skip ci]"
skip_untracked = false
pre_bump_hooks = []
post_bump_hooks = []
pre_package_bump_hooks = []
post_package_bump_hooks = []

[git_hooks.commit-msg]
script = """#!/bin/sh
set -e

# Verify the current commit message
cog verify --file $1

# Verify the repository history and configuration
cog check

# Run custom validation tool
"$(dirname \"$0\")/lockpick"
"""

[commit_types]

[changelog]
path = "CHANGELOG.md"
authors = []

[bump_profiles]
