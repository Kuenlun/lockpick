name: Rust

on:
  pull_request:
    branches: ["master", "develop"]

env:
  CARGO_TERM_COLOR: always

jobs:
  license-check:
    uses: ./.github/workflows/license-check.yml

  check:
    needs: [license-check]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-04-15
          components: rustfmt, clippy
      - name: Install lockpick
        uses: taiki-e/install-action@v2
        with:
          tool: lockpick,cargo-llvm-cov
      - name: Run checks
        run: lockpick -vvvv

  coverage:
    needs: [license-check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-04-15
          components: llvm-tools-preview
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - name: Enforce 100% coverage
        run: ./.github/check-coverage.sh

  merge-gate:
    runs-on: ubuntu-latest
    needs: [check, license-check, coverage]
    if: always()
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.check.result }}" != "success" ]]; then
            echo "::error::Check failed: ${{ needs.check.result }}"
            exit 1
          fi
          if [[ "${{ needs.license-check.result }}" != "success" ]]; then
            echo "::error::License check failed: ${{ needs.license-check.result }}"
            exit 1
          fi
          if [[ "${{ needs.coverage.result }}" != "success" ]]; then
            echo "::error::Coverage check failed: ${{ needs.coverage.result }}"
            exit 1
          fi
