name: Rust

on:
  pull_request:
    branches: ["master", "develop"]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy, llvm-tools-preview
      - name: Install external check tools
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov,cargo-machete,cargo-audit,cargo-nextest
      - name: Build lockpick from this commit
        run: cargo build --release --locked
      - name: Run lockpick on itself
        run: ./target/release/lockpick -v

  merge-gate:
    runs-on: ubuntu-latest
    needs: [check]
    if: always()
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.check.result }}" != "success" ]]; then
            echo "::error::Check failed: ${{ needs.check.result }}"
            exit 1
          fi
