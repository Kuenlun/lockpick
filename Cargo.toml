[package]
name = "lockpick"
version = "0.5.0"
edition = "2024"
description = "Rust CLI to enforce merge checks and code quality"
repository = "https://github.com/Kuenlun/lockpick"
authors = ["Juan Luis Leal Contreras <kuenlunleal@gmail.com>"]
license = "MIT OR Apache-2.0"

[dependencies]
clap = { version = "4.6.0", features = ["derive"] }
colored = "3.1.1"
glob = "0.3"
indicatif = "0.18.4"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "2.0.18"

[dev-dependencies]
assert_cmd = "2.2.0"
assert_fs = "1.1.3"
indoc = "2.0.7"

[lints.rust]
unsafe_code = "forbid"
warnings = "deny"
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(coverage_nightly)'] }

[lints.clippy]
pedantic = { level = "deny", priority = -1 }
nursery = { level = "deny", priority = -1 }
unwrap_used = "deny"
expect_used = "deny"

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
panic = "abort"
strip = "debuginfo"
debug = false
