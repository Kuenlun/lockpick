[package]
name = "lockpick"
version = "0.4.2"
edition = "2024"
description = "Rust CLI to enforce merge checks and code quality"
repository = "https://github.com/Kuenlun/lockpick"
authors = ["Juan Luis Leal Contreras <kuenlunleal@gmail.com>"]
license = "GPL-3.0-or-later"

[dependencies]
clap = { version = "4.6.0", features = ["derive"] }
colored = "3.1.1"
indicatif = "0.18.4"
log = { version = "0.4.29", features = ["std"] }
thiserror = "2.0.18"


[lints.rust]
unsafe_code = "forbid"
warnings = "deny"
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(coverage)'] }

[lints.clippy]
pedantic = { level = "deny", priority = -1 }
nursery = { level = "deny", priority = -1 }
unwrap_used = "deny"
expect_used = "deny"

[dev-dependencies]
assert_cmd = "2.2.0"
assert_fs = "1.1.3"
indoc = "2.0.7"
